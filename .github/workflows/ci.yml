name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # data/resume-data.json is gitignored PII; Vercel pulls from gist at build time.
      # CI has no gist access, so fall back to the committed template for typecheck/lint/test.
      - run: cp data/resume-data-template.json data/resume-data.json
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test --run
      - run: bun run deadcode

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify WASM binaries are fresh
        # Hash-only check — no Rust toolchain, no wasm-pack, runs in seconds.
        # Fails if committed public/wasm/ is stale vs current sources.
        # The weekly wasm-rebuild.yml workflow provides the authoritative backstop.
        run: bash scripts/check-wasm.sh --verify
      - name: Enforce WASM bundle size budget
        # Defaults to 17 MB raw / 6.5 MB gzipped (matches justfile:14-16).
        run: bash scripts/check-bundle-size.sh

  commitlint:
    name: Commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
